<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login · SmartHealth</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head><body>
<header class="navbar"><div class="brand">Smart<span>Health</span></div>
<nav><a href="index.html">Home</a></nav></header>
<form class="form" id="loginForm">
  <h2>Welcome back</h2>
  <label>Email</label><input type="email" name="email" required/>
  <label>Password</label><input type="password" name="password" required minlength="6"/>
  <div id="msg"></div>
  <br/>
  <button class="btn btn-primary" type="submit" id="submitBtn">Sign in</button>
  <p style="color:var(--muted);font-size:14px;margin-top:14px">No account? <a href="register.html">Register</a></p>
</form>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body></html>
